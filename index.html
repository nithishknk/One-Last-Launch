<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Parkour Zombie Game</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
    <!-- Babylon Core Engine -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- Babylon Loaders (for .glb and .gltf files) -->
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <!-- 🔥 NEW: Babylon GUI (REQUIRED FOR THE HEALTH BAR) 🔥 -->
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <!-- Your game script -->
    <script src="game.js"></script>
</body>

</html>
